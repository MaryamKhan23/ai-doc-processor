version: "3.9"

services:

  ollama:
    image: ollama/ollama:latest
    container_name: doc_processor_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    container_name: doc_processor_init
    depends_on:
      - ollama
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      sh -c "
        echo 'Waiting for Ollama...' &&
        sleep 5 &&
        ollama pull llama3.2:3b &&
        echo 'Ready!'
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doc_processor_backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - MODEL_NAME=llama3.2:3b
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data: